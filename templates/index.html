<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luminary Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/main.css"/>
</head>
<body data-theme="dark">

<!-- ═══════════════════════════════ SIDEBAR ════════════════════════════════ -->
<aside id="sidebar">
  <div class="sidebar-top">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M14 2L4 8V20L14 26L24 20V8L14 2Z" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
        <path d="M14 6L8 10V18L14 22L20 18V10L14 6Z" fill="var(--accent)" opacity="0.3"/>
        <circle cx="14" cy="14" r="3" fill="var(--accent)"/>
      </svg>
      <span class="logo-text">Luminary</span>
    </div>
    <button class="icon-btn" id="sidebarToggle" title="Toggle sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item active" data-view="library">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Library</span>
    </button>
    <button class="nav-item" data-view="recent">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Recent</span>
    </button>
  </nav>

  <div class="sidebar-bottom">
    <div class="theme-switcher">
      <span class="theme-label">Theme</span>
      <div class="theme-pills">
        <button class="theme-pill" data-theme="dark" title="Dark">🌙</button>
        <button class="theme-pill active" data-theme="light" title="Light">☀️</button>
        <button class="theme-pill" data-theme="sepia" title="Sepia">📜</button>
        <button class="theme-pill" data-theme="forest" title="Forest">🌿</button>
        <button class="theme-pill" data-theme="midnight" title="Midnight">🌌</button>
        <button class="theme-pill" data-theme="rose" title="Rose">🌸</button>
      </div>
    </div>
    <div class="brightness-row">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <input type="range" id="brightnessSlider" min="30" max="100" value="100" class="brightness-slider"/>
    </div>
  </div>
</aside>

<!-- ══════════════════════════════ MAIN AREA ═══════════════════════════════ -->
<main id="main">

  <!-- ── Library View ── -->
  <div id="view-library" class="view active">
    <header class="view-header">
      <div>
        <h1 class="view-title">My Library</h1>
        <p class="view-subtitle" id="bookCount">0 books</p>
      </div>
      <div class="header-actions">
        <div class="search-box">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search library…"/>
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="pdf">PDF</button>
          <button class="filter-tab" data-filter="epub">EPUB</button>
          <button class="filter-tab" data-filter="manga">Manga</button>
        </div>
        <button class="btn-primary" id="addBookBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Book
        </button>
      </div>
    </header>
    <div id="bookGrid" class="book-grid"></div>
    <div id="emptyLibrary" class="empty-state" style="display:none">
      <div class="empty-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </div>
      <h3>Your library is empty</h3>
      <p>Add PDF, EPUB, CBZ, or CBR files to get started</p>
      <button class="btn-primary" id="addBookBtn2">Add your first book</button>
    </div>
  </div>

  <!-- ── Reader View ── -->
  <div id="view-reader" class="view">
    <div id="readerTopBar" class="reader-topbar">
      <button class="icon-btn" id="backToLibrary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="reader-title-area">
        <span id="readerTitle" class="reader-book-title"></span>
        <span id="readerPageInfo" class="reader-page-info"></span>
      </div>
      <div class="reader-controls">
        <button class="icon-btn" id="tocToggleBtn" title="Table of Contents">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button class="icon-btn" id="fitToggleBtn" title="Fit mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
        <div class="zoom-controls">
          <button class="icon-btn" id="zoomOut">−</button>
          <span id="zoomLevel">100%</span>
          <button class="icon-btn" id="zoomIn">+</button>
        </div>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="reader-progress-bar">
      <div id="readerProgress" class="reader-progress-fill"></div>
    </div>

    <!-- TOC Panel -->
    <div id="tocPanel" class="toc-panel hidden">
      <div class="toc-header">
        <h3>Contents</h3>
        <button class="icon-btn" id="tocClose">×</button>
      </div>
      <ul id="tocList" class="toc-list"></ul>
    </div>

    <!-- Reader Content -->
    <div id="readerCanvas" class="reader-canvas">
      <div id="pageContainer" class="page-container">
        <!-- Pages rendered here -->
      </div>
      <!-- Manga two-page spread toggle -->
      <div id="mangaControls" class="manga-controls hidden">
        <button class="icon-btn" id="spreadToggle" title="Two-page spread">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="10" height="16" rx="1"/><rect x="13" y="4" width="10" height="16" rx="1"/></svg>
        </button>
        <span id="mangaReadDir" class="manga-dir-badge">LTR</span>
        <button class="icon-btn" id="dirToggle" title="Reading direction">⇄</button>
      </div>
      <!-- EPUB two-page spread toggle -->
      <div id="epubControls" class="manga-controls hidden">
        <button class="icon-btn" id="epubSpreadToggle" title="Two-page spread">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="10" height="16" rx="1"/><rect x="13" y="4" width="10" height="16" rx="1"/></svg>
        </button>
        <span class="manga-dir-badge" style="font-size:10px;padding:2px 5px">2-PAGE</span>
      </div>
    </div>

    <!-- Bottom Nav -->
    <div class="reader-bottom">
      <button class="reader-nav-btn" id="prevPage">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        <span>Previous</span>
      </button>
      <div class="page-jump">
        <input type="number" id="pageJumpInput" min="1"/>
        <span id="pageJumpTotal"></span>
      </div>
      <button class="reader-nav-btn right" id="nextPage">
        <span>Next</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

</main>

<!-- ══════════════════════════ ADD BOOK MODAL ═══════════════════════════════ -->
<div id="addModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2>Add to Library</h2>
      <button class="icon-btn modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body">
      <div class="drop-zone" id="dropZone">
        <div class="drop-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <p class="drop-text">Drag & drop files here</p>
        <p class="drop-sub">PDF · EPUB · CBZ · CBR</p>
        <button class="btn-secondary" id="browseBtn">Browse Files</button>
        <input type="file" id="fileInput" accept=".pdf,.epub,.cbz,.cbr" multiple style="display:none"/>
      </div>
      <div class="modal-path-row">
        <input type="text" id="pathInput" placeholder="Or paste file path…" class="path-input"/>
        <button class="btn-primary" id="addPathBtn">Add</button>
      </div>
      <div id="addStatus" class="add-status"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════ CONTEXT MENU ════════════════════════════════ -->
<div id="contextMenu" class="context-menu hidden">
  <button id="ctxOpen">📖 Open</button>
  <button id="ctxRemove">🗑 Remove from library</button>
</div>

<!-- Brightness overlay -->
<div id="brightnessOverlay" class="brightness-overlay"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
